spring.application.name=donezo-backend

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/donezo}
spring.data.mongodb.auto-index-creation=true

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:donezo_local_development_secret_change_this_to_a_very_long_random_value_1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Twilio SMS Configuration
# For local testing, dummy values allow backend to start.
# For real SMS OTP, replace these values with your real Twilio credentials.
twilio.account-sid=${TWILIO_ACCOUNT_SID:dummy_account_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:dummy_auth_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+10000000000}
twilio.from-number=${TWILIO_FROM_NUMBER:+10000000000}