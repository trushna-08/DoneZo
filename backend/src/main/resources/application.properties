spring.application.name=donezo-backend

# MongoDB Configuration
# Local: mongodb://localhost:27017/donezo
# Deployment: use MONGODB_URI environment variable from Render
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://donezo_user:<db_password>@cluster0.aczdhe2.mongodb.net/?appName=Cluster0}
spring.data.mongodb.auto-index-creation=true

# Server Configuration
# Local: 8080
# Render: PORT is provided automatically
server.port=${PORT:${SERVER_PORT:8080}}

# JWT Configuration
jwt.secret=${JWT_SECRET:donezo_local_development_secret_change_this_to_a_very_long_random_value_1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Twilio SMS Configuration
# Dummy values allow backend to start locally.
# Add real Twilio values in Render later if you want real OTP SMS.
twilio.account-sid=${TWILIO_ACCOUNT_SID:dummy_account_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:dummy_auth_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+10000000000}
twilio.from-number=${TWILIO_FROM_NUMBER:+10000000000}

# OpenAI Configuration
# Keep this only in backend environment variables, never in frontend.
openai.api-key=${OPENAI_API_KEY:}